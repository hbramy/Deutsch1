<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprechen wir! — تعلم الألمانية</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: #0f1117;
  color: #e8e8e8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 700px;
  margin: 0 auto;
}
header {
  background: #1a1d2e;
  border-bottom: 2px solid #3b82f6;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
header h1 { font-size: 20px; font-weight: 700; color: #fff; }
header p { font-size: 12px; color: #888; }
.flag { font-size: 28px; }
#topic-bar {
  padding: 10px 16px;
  background: #13161f;
  border-bottom: 1px solid #222;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
#topic-bar::-webkit-scrollbar { display: none; }
.topic-btn {
  background: #1e2235;
  border: 1px solid #2d3250;
  color: #93c5fd;
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.topic-btn:hover, .topic-btn.active {
  background: #1e3a5f;
  border-color: #3b82f6;
  color: #fff;
}
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.bubble {
  padding: 14px 16px;
  border-radius: 16px;
  line-height: 1.7;
  font-size: 15px;
  animation: fadeIn 0.3s ease;
  max-width: 90%;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
.bubble.bot {
  background: #1e2235;
  border: 1px solid #2d3250;
  align-self: flex-start;
  border-bottom-right-radius: 4px;
}
.bubble.user {
  background: #1e3a5f;
  border: 1px solid #2d5a8e;
  align-self: flex-end;
  border-bottom-left-radius: 4px;
  text-align: right;
}
.de-text {
  font-size: 18px;
  font-weight: 700;
  color: #93c5fd;
  direction: ltr;
  text-align: left;
  margin-bottom: 4px;
}
.ar-text { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
.instruction { font-size: 14px; color: #cbd5e1; margin-top: 6px; }
.tip {
  margin-top: 10px;
  font-size: 13px;
  color: #fbbf24;
  background: #2a1f00;
  padding: 7px 10px;
  border-radius: 8px;
  border-right: 3px solid #fbbf24;
}
.correct { color: #4ade80; font-weight: 600; }
.wrong   { color: #f87171; }
.speak-btn {
  background: #1e3a5f;
  border: 1px solid #3b82f6;
  color: #93c5fd;
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 13px;
  cursor: pointer;
  margin-top: 8px;
  direction: ltr;
  display: inline-block;
}
.speak-btn:hover { background: #2d5a8e; }
#bottom {
  background: #1a1d2e;
  border-top: 1px solid #222;
  padding: 12px 16px;
}
#status {
  text-align: center;
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 10px;
  min-height: 20px;
}
#status.listening { color: #ef4444; font-weight: 600; }
#status.success   { color: #4ade80; }
.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}
#mic-btn {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 3px solid #3b82f6;
  background: #1e2235;
  font-size: 26px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
#mic-btn:hover { background: #1e3a5f; }
#mic-btn.on {
  background: #3b0000;
  border-color: #ef4444;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
  50%      { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
}
#text-input {
  flex: 1;
  background: #0f1117;
  border: 1px solid #2d3250;
  border-radius: 12px;
  padding: 12px 14px;
  color: #e8e8e8;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  direction: ltr;
}
#text-input:focus { border-color: #3b82f6; }
#send-btn {
  background: #3b82f6;
  border: none;
  border-radius: 12px;
  width: 46px; height: 46px;
  cursor: pointer;
  font-size: 20px;
  color: white;
  flex-shrink: 0;
}
#send-btn:hover { background: #2563eb; }
#hint {
  text-align: center;
  font-size: 12px;
  color: #4b5563;
  margin-top: 8px;
}
</style>
</head>
<body>

<header>
  <span class="flag">🇩🇪</span>
  <div>
    <h1>Sprechen wir!</h1>
    <p>تحدث بالألمانية — صوت أو كتابة</p>
  </div>
</header>

<div id="topic-bar">
  <button class="topic-btn active" onclick="loadTopic('greeting')">👋 تعارف</button>
  <button class="topic-btn" onclick="loadTopic('shopping')">🛒 التسوق</button>
  <button class="topic-btn" onclick="loadTopic('doctor')">🏥 الطبيب</button>
  <button class="topic-btn" onclick="loadTopic('transport')">🚌 النقل</button>
  <button class="topic-btn" onclick="loadTopic('work')">💼 العمل</button>
  <button class="topic-btn" onclick="loadTopic('numbers')">🔢 الأرقام</button>
  <button class="topic-btn" onclick="loadTopic('food')">🍽️ الطعام</button>
</div>

<div id="chat"></div>

<div id="bottom">
  <div id="status">اضغط 🎤 وتحدث بالألمانية</div>
  <div class="controls">
    <button id="mic-btn" onclick="toggleMic()">🎤</button>
    <input id="text-input" type="text" placeholder="أو اكتب بالألمانية هنا..." 
      onkeydown="if(event.key==='Enter') checkAnswer(this.value)">
    <button id="send-btn" onclick="checkAnswer(document.getElementById('text-input').value)">➤</button>
  </div>
  <div id="hint"></div>
</div>

<script>

// ══════════════════════════════════════════════

      { de: 'vier, fünf, sechs', ar: '٤، ٥، ٦', ask: 'قل الأرقام من 4 إلى 6', answers: ['vier fünf sechs', 'vier funf sechs'], tip: '💡 fünf ينطق فونف' },
      { de: 'sieben, acht, neun, zehn', ar: '٧، ٨، ٩، ١٠', ask: 'قل الأرقام من 7 إلى 10', answers: ['sieben acht neun zehn'], tip: '💡 zehn = عشرة' },
      { de: 'Wie spät ist es?', ar: 'كم الساعة؟', ask: 'كيف تسأل عن الوقت؟', answers: ['wie spät ist es', 'wie spat ist es'], tip: '💡 spät = متأخر، لكن في سؤال الوقت معناها "كم الساعة"' },
      { de: 'Es ist drei Uhr.', ar: 'الساعة الثالثة.', ask: 'قل "الساعة الثالثة"', answers: ['es ist drei uhr'], tip: '💡 Uhr = ساعة' },
    ]
  },
  food: {

      { de: 'Ich hätte gerne die Speisekarte.', ar: 'أريد قائمة الطعام.', ask: 'اطلب قائمة الطعام', answers: ['ich hätte gerne die speisekarte', 'ich hatte gerne die speisekarte'], tip: '💡 Speisekarte = قائمة الطعام' },

      { de: 'Ich bin allergisch gegen Schweinefleisch.', ar: 'أنا حساس لحم الخنزير.', ask: 'قل أنك لا تأكل لحم الخنزير', answers: ['ich bin allergisch gegen schweinefleisch'], tip: '💡 جملة مهمة جداً للمسلمين في ألمانيا!' },
      { de: 'Die Rechnung, bitte.', ar: 'الحساب، من فضلك.', ask: 'اطلب الحساب', answers: ['die rechnung bitte', 'die rechnung, bitte'], tip: '💡 Rechnung = الفاتورة/الحساب' },
      { de: 'Es war sehr lecker!', ar: 'كان لذيذاً جداً!', ask: 'أثنِ على الطعام', answers: ['es war sehr lecker'], tip: '💡 lecker = لذيذ، كلمة يحبها الألمان' },

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentTopic = 'greeting';
let currentLesson = 0;
let awaitingAnswer = false;
let recognition = null;
let isListening = false;

const chatEl   = document.getElementById('chat');
const statusEl = document.getElementById('status');
const hintEl   = document.getElementById('hint');
const micBtn   = document.getElementById('mic-btn');
const textInput= document.getElementById('text-input');

// ══════════════════════════════════════════════
//  SPEECH SYNTHESIS (نطق الألمانية)
// ══════════════════════════════════════════════
function speak(text, lang = 'de-DE', cb) {
  if (!window.speechSynthesis) { cb && cb(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang  = lang;
  utt.rate  = 0.82;
  utt.pitch = 1;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith(lang.split('-')[0]));
  if (v) utt.voice = v;
  utt.onend = () => cb && cb();
  speechSynthesis.speak(utt);
}

// preload voices
speechSynthesis.getVoices();
speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());

// ══════════════════════════════════════════════
//  SPEECH RECOGNITION (التعرف على صوتك)
// ══════════════════════════════════════════════
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'de-DE';
  r.continuous = false;
  r.interimResults = false;

  r.onstart = () => {
    isListening = true;
    micBtn.classList.add('on');
    statusEl.className = 'listening';
    statusEl.textContent = '🔴 استمع... تكلم الآن بالألمانية';
  };

  r.onresult = (e) => {
    const said = e.results[0][0].transcript;
    textInput.value = said;
    checkAnswer(said);
  };

  r.onerror = (e) => {
    statusEl.textContent = e.error === 'no-speech'
      ? '❗ لم أسمع شيئاً، حاول مرة أخرى'
      : '❗ ' + e.error;
    stopListening();
  };

  r.onend = () => stopListening();
  return r;
}

function stopListening() {
  isListening = false;
  micBtn.classList.remove('on');
  statusEl.className = '';
}

function toggleMic() {
  if (!recognition) recognition = initRecognition();
  if (!recognition) {
    statusEl.textContent = '❗ المتصفح لا يدعم التعرف الصوتي — جرب Chrome';
    return;
  }
  if (isListening) {
    recognition.stop();
    stopListening();
  } else {
    try { recognition.start(); }
    catch(e) { recognition = initRecognition(); recognition && recognition.start(); }
  }
}

// ══════════════════════════════════════════════
//  CHAT HELPERS
// ══════════════════════════════════════════════
function addBubble(html, type) {
  const div = document.createElement('div');
  div.className = 'bubble ' + type;
  div.innerHTML = html;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

// ══════════════════════════════════════════════
//  LESSON ENGINE
// ══════════════════════════════════════════════
function loadTopic(key) {
  currentTopic  = key;
  currentLesson = 0;
  awaitingAnswer = false;
  chatEl.innerHTML = '';
  textInput.value = '';
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  hintEl.textContent = '';
  nextLesson();
}

function nextLesson() {
  const t = topics[currentTopic];
  if (currentLesson >= t.lessons.length) {
    addBubble(`
      <div class="correct">🎉 أحسنت! أنهيت موضوع "${t.name}" بنجاح!</div>
      <div class="instruction" style="margin-top:8px">اختر موضوعاً جديداً من الأعلى لمواصلة التعلم 👆</div>
    `, 'bot');
    awaitingAnswer = false;
    statusEl.textContent = 'اختر موضوعاً جديداً';
    return;
  }

  const lesson = t.lessons[currentLesson];
  awaitingAnswer = true;

  const html = `
    <div class="de-text">${lesson.de} 
      <button class="speak-btn" onclick="speak('${lesson.de.replace(/'/g,"\\'")}')">🔊 استمع</button>
    </div>
    <div class="ar-text">${lesson.ar}</div>
    <div class="instruction">📝 ${lesson.ask}</div>
    ${lesson.tip ? `<div class="tip">${lesson.tip}</div>` : ''}
  `;

  const bubble = addBubble(html, 'bot');

  // Auto-speak
  setTimeout(() => {
    speak(lesson.de, 'de-DE', () => {
      statusEl.textContent = '🎤 دورك — تحدث أو اكتب';
      hintEl.textContent = 'مثال: ' + lesson.answers[0];
    });
  }, 400);

  textInput.value = '';
  textInput.focus();
}

function normalize(s) {
  return s.toLowerCase()
    .replace(/[.,!?؟،]/g, '')
    .replace(/ä/g,'a').replace(/ö/g,'o').replace(/ü/g,'u')
    .replace(/ß/g,'ss')
    .trim();
}

function checkAnswer(raw) {
  if (!awaitingAnswer || !raw.trim()) return;
  awaitingAnswer = false;
  textInput.value = '';
  hintEl.textContent = '';

  const userNorm = normalize(raw);
  const lesson   = topics[currentTopic].lessons[currentLesson];
  const correct  = lesson.answers.some(a => normalize(a) === userNorm);

  // Show user bubble
  addBubble(raw, 'user');

  if (correct) {
    statusEl.className = 'success';
    statusEl.textContent = '✅ ممتاز!';
    speak('Sehr gut!', 'de-DE', () => {
      addBubble(`<span class="correct">✅ ممتاز! إجابة صحيحة تماماً 🎯</span>`, 'bot');
      currentLesson++;
      setTimeout(nextLesson, 1200);
    });
  } else {
    statusEl.className = '';
    statusEl.textContent = '';
    const correct_answer = lesson.answers[0];
    addBubble(`
      <div class="wrong">❌ ليس تماماً</div>
      <div class="instruction" style="margin-top:6px">الإجابة الصحيحة:</div>
      <div class="de-text" style="margin-top:4px">${lesson.de}
        <button class="speak-btn" onclick="speak('${lesson.de.replace(/'/g,"\\'")}')">🔊</button>
      </div>
      <div class="instruction" style="margin-top:8px">حاول مرة أخرى 👇</div>
    `, 'bot');

    speak(lesson.de, 'de-DE', () => {
      awaitingAnswer = true;
      statusEl.textContent = '🎤 حاول مرة أخرى';
      hintEl.textContent = 'تلميح: ' + lesson.answers[0];
    });
  }
}

// ══════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════
nextLesson();
</script>
