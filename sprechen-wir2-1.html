<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprechen wir! — محادثة ألمانية حقيقية</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: #0f1117; color: #e8e8e8;
  min-height: 100vh; display: flex; flex-direction: column;
  max-width: 700px; margin: 0 auto;
}
header {
  background: #1a1d2e; border-bottom: 2px solid #3b82f6;
  padding: 14px 20px; display: flex; align-items: center; gap: 12px;
}
header h1 { font-size: 20px; font-weight: 700; color: #fff; }
header p  { font-size: 12px; color: #888; margin-top: 2px; }
.flag { font-size: 28px; }
#scenario-bar {
  padding: 10px 16px; background: #13161f;
  border-bottom: 1px solid #222; display: flex;
  gap: 8px; overflow-x: auto; scrollbar-width: none;
}
#scenario-bar::-webkit-scrollbar { display: none; }
.sc-btn {
  background: #1e2235; border: 1px solid #2d3250; color: #93c5fd;
  padding: 7px 14px; border-radius: 20px; font-size: 13px;
  cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.sc-btn:hover, .sc-btn.active {
  background: #1e3a5f; border-color: #3b82f6; color: #fff;
}
#chat {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.bubble {
  padding: 12px 16px; border-radius: 16px; line-height: 1.7;
  font-size: 15px; animation: pop 0.25s ease; max-width: 88%;
}
@keyframes pop {
  from { opacity:0; transform:scale(0.96) translateY(6px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.bubble.bot {
  background: #1e2235; border: 1px solid #2d3250;
  align-self: flex-start; border-bottom-right-radius: 4px;
}
.bubble.user {
  background: #1e3a5f; border: 1px solid #2d5a8e;
  align-self: flex-end; border-bottom-left-radius: 4px; text-align: right;
}
.bubble.system {
  background: #1a2a1a; border: 1px solid #2d5a2d;
  align-self: center; font-size: 13px; color: #4ade80;
  text-align: center; max-width: 95%;
}
.de { color: #93c5fd; font-weight: 600; direction: ltr; text-align: left; margin-bottom: 3px; }
.ar { color: #94a3b8; font-size: 13px; margin-top: 2px; }
.speak-btn {
  background: none; border: 1px solid #2d3250; color: #93c5fd;
  border-radius: 6px; padding: 3px 8px; font-size: 12px;
  cursor: pointer; margin-top: 8px; direction: ltr; display: inline-block;
}
.speak-btn:hover { background: #1e3a5f; }
.typing {
  display: flex; gap: 5px; padding: 14px 16px;
  background: #1e2235; border: 1px solid #2d3250;
  border-radius: 16px; border-bottom-right-radius: 4px;
  align-self: flex-start; width: 65px;
}
.typing span {
  width: 8px; height: 8px; background: #3b82f6;
  border-radius: 50%; animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-7px); }
}
#bottom { background: #1a1d2e; border-top: 1px solid #222; padding: 12px 16px; }
#status {
  text-align: center; font-size: 13px; color: #64748b;
  margin-bottom: 10px; min-height: 20px;
}
#status.listening { color: #ef4444; font-weight: 600; }
#status.speaking  { color: #3b82f6; }
#status.thinking  { color: #a855f7; }
.controls { display: flex; gap: 10px; align-items: center; }
#mic-btn {
  width: 58px; height: 58px; border-radius: 50%;
  border: 3px solid #3b82f6; background: #1e2235;
  font-size: 24px; cursor: pointer; transition: all 0.2s;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
#mic-btn:hover { background: #1e3a5f; }
#mic-btn.on { background: #3b0000; border-color: #ef4444; animation: pulse 1s infinite; }
#mic-btn:disabled { opacity: 0.4; cursor: not-allowed; animation: none; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
  50%      { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
}
#text-input {
  flex: 1; background: #0f1117; border: 1px solid #2d3250;
  border-radius: 12px; padding: 12px 14px; color: #e8e8e8;
  font-size: 15px; font-family: inherit; outline: none; direction: ltr;
}
#text-input:focus { border-color: #3b82f6; }
#text-input::placeholder { color: #374151; }
#send-btn {
  background: #3b82f6; border: none; border-radius: 12px;
  width: 46px; height: 46px; cursor: pointer; font-size: 20px;
  color: white; flex-shrink: 0; transition: background 0.2s;
}
#send-btn:hover { background: #2563eb; }
#send-btn:disabled { background: #1e3a5f; cursor: not-allowed; }
#new-btn {
  width: 100%; margin-top: 10px; background: #1e2235;
  border: 1px solid #2d3250; color: #93c5fd; padding: 9px;
  border-radius: 10px; font-size: 13px; cursor: pointer; font-family: inherit;
}
#new-btn:hover { background: #1e3a5f; }
</style>
</head>
<body>
<header>
  <span class="flag">🇩🇪</span>
  <div><h1>Sprechen wir!</h1><p>محادثة ألمانية حقيقية مع AI</p></div>
</header>
<div id="scenario-bar">
  <button class="sc-btn active" onclick="startScenario('greeting',this)">👋 تعارف</button>
  <button class="sc-btn" onclick="startScenario('cafe',this)">☕ المقهى</button>
  <button class="sc-btn" onclick="startScenario('doctor',this)">🏥 الطبيب</button>
  <button class="sc-btn" onclick="startScenario('transport',this)">🚌 المواصلات</button>
  <button class="sc-btn" onclick="startScenario('work',this)">💼 العمل</button>
  <button class="sc-btn" onclick="startScenario('shopping',this)">🛒 التسوق</button>
  <button class="sc-btn" onclick="startScenario('free',this)">💬 حرة</button>
</div>
<div id="chat"></div>
<div id="bottom">
  <div id="status">اختر موضوعاً للبدء 👆</div>
  <div class="controls">
    <button id="mic-btn" onclick="toggleMic()" disabled>🎤</button>
    <input id="text-input" type="text" placeholder="أو اكتب بالألمانية / العربية..."
      onkeydown="if(event.key==='Enter') sendText()">
    <button id="send-btn" onclick="sendText()" disabled>➤</button>
  </div>
  <button id="new-btn" onclick="restartScenario()">🔄 محادثة جديدة</button>
</div>
<script>
const API_KEY = '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';
const API_URL = 'https://openrouter.ai/api/v1/chat/completions';

const SCENARIOS = {
  greeting: { label:'تعارف', sys:`أنت Klaus، ألماني تلتقي برامي للمرة الأولى. تحدث بالألمانية البسيطة مستوى A2. بعد كل جملة ألمانية اكتب ترجمتها العربية هكذا: [الترجمة]. إذا أخطأ رامي صحح له بلطف. جملتان كحد أقصى في كل رد.` },
  cafe:     { label:'في المقهى', sys:`أنت نادل في مقهى ألماني. رامي عميل يريد الطلب. تحدث بالألمانية البسيطة مستوى A2. بعد كل جملة اكتب ترجمتها: [الترجمة]. صحح أخطاءه بلطف. جملتان كحد أقصى.` },
  doctor:   { label:'عند الطبيب', sys:`أنت طبيب ألماني. رامي مريض يزورك. تحدث بالألمانية البسيطة مستوى A2. بعد كل جملة اكتب ترجمتها: [الترجمة]. اسأل عن أعراضه. صحح أخطاءه بلطف. جملتان كحد أقصى.` },
  transport:{ label:'المواصلات', sys:`أنت موظف محطة قطار ألمانية. رامي يريد السفر لميونخ. تحدث بالألمانية البسيطة مستوى A2. بعد كل جملة اكتب ترجمتها: [الترجمة]. صحح أخطاءه بلطف. جملتان كحد أقصى.` },
  work:     { label:'في العمل', sys:`أنت مدير شركة ألمانية تجري مقابلة عمل مع رامي السائق. تحدث بالألمانية البسيطة مستوى A2. بعد كل جملة اكتب ترجمتها: [الترجمة]. صحح أخطاءه بلطف. جملتان كحد أقصى.` },
  shopping: { label:'التسوق', sys:`أنت بائع في محل ملابس ألماني. رامي يبحث عن قميص. تحدث بالألمانية البسيطة مستوى A2. بعد كل جملة اكتب ترجمتها: [الترجمة]. صحح أخطاءه بلطف. جملتان كحد أقصى.` },
  free:     { label:'محادثة حرة', sys:`أنت صديق ألماني اسمك Felix. تحدث مع رامي بشكل طبيعي. مستوى A2. بعد كل جملة اكتب ترجمتها: [الترجمة]. صحح أخطاءه بلطف. جملتان كحد أقصى.` }
};

let history = [];
let currentScenario = 'greeting';
let isLoading = false;
let recognition = null;
let isListening = false;
let isSpeaking = false;

const chatEl    = document.getElementById('chat');
const statusEl  = document.getElementById('status');
const micBtn    = document.getElementById('mic-btn');
const sendBtn   = document.getElementById('send-btn');
const textInput = document.getElementById('text-input');

function speak(text, cb) {
  if (!window.speechSynthesis) { cb&&cb(); return; }
  window.speechSynthesis.cancel();
  const deOnly = text.replace(/\[.*?\]/g,'').trim();
  if (!deOnly) { cb&&cb(); return; }
  isSpeaking = true;
  statusEl.className = 'speaking';
  statusEl.textContent = '🔊 يتكلم...';
  const utt = new SpeechSynthesisUtterance(deOnly);
  utt.lang = 'de-DE'; utt.rate = 0.82;
  const v = speechSynthesis.getVoices().find(v=>v.lang.startsWith('de'));
  if (v) utt.voice = v;
  utt.onend = ()=>{ isSpeaking=false; setReady(); cb&&cb(); };
  utt.onerror = ()=>{ isSpeaking=false; setReady(); cb&&cb(); };
  speechSynthesis.speak(utt);
}
speechSynthesis.getVoices();
speechSynthesis.addEventListener('voiceschanged', ()=>speechSynthesis.getVoices());

function setReady() {
  statusEl.className = '';
  statusEl.textContent = '🎤 دورك — تحدث أو اكتب';
  micBtn.disabled = false;
  sendBtn.disabled = false;
}

function initRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang='de-DE'; r.continuous=false; r.interimResults=false;
  r.onstart = ()=>{ isListening=true; micBtn.classList.add('on'); statusEl.className='listening'; statusEl.textContent='🔴 استمع... تكلم الآن بالألمانية'; };
  r.onresult = (e)=>{ textInput.value=e.results[0][0].transcript; stopListening(); sendText(); };
  r.onerror = (e)=>{ statusEl.textContent=e.error==='no-speech'?'❗ لم أسمع شيئاً':'❗ '+e.error; stopListening(); };
  r.onend = ()=>stopListening();
  return r;
}
function stopListening() {
  isListening=false; micBtn.classList.remove('on');
  try { if(recognition) recognition.stop(); } catch(e){}
}
function toggleMic() {
  if (isLoading||isSpeaking) return;
  if (!recognition) recognition=initRec();
  if (!recognition) { statusEl.textContent='❗ جرب Chrome'; return; }
  if (isListening) stopListening();
  else { try { recognition.start(); } catch(e){ recognition=initRec(); recognition&&recognition.start(); } }
}

function addBubble(content, type) {
  const div = document.createElement('div');
  div.className = 'bubble '+type;
  if (type==='bot') {
    const lines = content.split('\n').filter(l=>l.trim());
    let html = '';
    lines.forEach(line=>{
      const m = line.match(/\[(.+?)\]/);
      const dePart = line.replace(/\[.+?\]/,'').trim();
      if (dePart) html += `<div class="de">🇩🇪 ${dePart}</div>`;
      if (m) html += `<div class="ar">🇸🇦 ${m[1]}</div>`;
    });
    div.innerHTML = html || content;
    const btn = document.createElement('button');
    btn.className='speak-btn'; btn.textContent='🔊 أعد النطق';
    btn.onclick=()=>speak(content);
    div.appendChild(btn);
  } else {
    div.textContent = content;
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function showTyping() {
  const d=document.createElement('div');
  d.className='typing'; d.id='typing';
  d.innerHTML='<span></span><span></span><span></span>';
  chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight;
}
function removeTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }

async function callAI(userMsg) {
  const sc = SCENARIOS[currentScenario];
  history.push({ role:'user', content:userMsg });
  const res = await fetch(API_URL, {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+API_KEY,
      'HTTP-Referer':'https://hbramy.github.io',
      'X-Title':'Sprechen wir'
    },
    body: JSON.stringify({
      model: 'meta-llama/llama-3.1-8b-instruct:free',
      messages: [
        { role:'system', content: sc.sys },
        ...history
      ],
      max_tokens: 200
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const reply = data.choices[0].message.content;
  history.push({ role:'assistant', content:reply });
  return reply;
}

async function sendText() {
  const text = textInput.value.trim();
  if (!text||isLoading) return;
  textInput.value='';
  addBubble(text,'user');
  await getReply(text);
}

async function getReply(userMsg) {
  isLoading=true; micBtn.disabled=true; sendBtn.disabled=true;
  statusEl.className='thinking'; statusEl.textContent='💭 يفكر...';
  showTyping();
  try {
    const reply = await callAI(userMsg);
    removeTyping();
    addBubble(reply,'bot');
    speak(reply,()=>{});
  } catch(e) {
    removeTyping();
    addBubble('❗ خطأ: '+e.message,'system');
    setReady();
  }
  isLoading=false;
}

async function startScenario(key, btn) {
  currentScenario=key; history=[]; chatEl.innerHTML=''; textInput.value='';
  document.querySelectorAll('.sc-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  micBtn.disabled=true; sendBtn.disabled=true;
  addBubble('بدأت محادثة: '+SCENARIOS[key].label+' 🇩🇪','system');
  await getReply('ابدأ المحادثة الآن بجملة ألمانية واحدة قصيرة مناسبة للموقف.');
}

function restartScenario() {
  history=[]; chatEl.innerHTML='';
  window.speechSynthesis&&window.speechSynthesis.cancel();
  addBubble('محادثة جديدة 🔄','system');
  getReply('ابدأ المحادثة من جديد بجملة ألمانية واحدة قصيرة.');
}

startScenario('greeting', null);
</script>
</body>
</html>
